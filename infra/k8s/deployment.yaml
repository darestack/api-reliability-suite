apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-api
  labels:
    app: reliability-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliability-api
  template:
    metadata:
      labels:
        app: reliability-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: reliability-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # -----------------------------------------------------------
          # Template baseline: probes are required for health-based routing
          # -----------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: PROMETHEUS_BASE_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: reliability-api-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reliability-api-secrets
                  key: DATABASE_URL
            - name: RATE_LIMIT_STORAGE_URI
              valueFrom:
                secretKeyRef:
                  name: reliability-api-secrets
                  key: RATE_LIMIT_STORAGE_URI
            - name: CIRCUIT_BREAKER_CACHE_URL
              valueFrom:
                secretKeyRef:
                  name: reliability-api-secrets
                  key: CIRCUIT_BREAKER_CACHE_URL
