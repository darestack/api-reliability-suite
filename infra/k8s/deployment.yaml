apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-api
  labels:
    app: reliability-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliability-api
  template:
    metadata:
      labels:
        app: reliability-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: reliability-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # -----------------------------------------------------------
          # 2026 Reliability Standard: Probes are Mandalaory
          # -----------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: OTLP_ENDPOINT
              value: "http://otel-collector:4317"
