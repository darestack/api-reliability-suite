apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reliability-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reliability-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # -----------------------------------------------------------
  # 2026 Reliability Standard: Stable Scaling Logic
  # Prevents "flapping" (rapid scale up/down)
  # -----------------------------------------------------------
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
