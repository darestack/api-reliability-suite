groups:
  - name: golden_signals
    rules:
      # Signal 1: Errors
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[1m]))
          /
          sum(rate(http_requests_total[1m]))
          > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High Error Rate (>5%)"
          description: "API is failing significantly. Current rate: {{ $value }}"

      # Signal 2: Latency
      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High P99 Latency (>1s)"
          description: "API is slow. P99 latency is {{ $value }}s."

      # Signal 3: Saturation/Resilience
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Circuit Breaker Tripped"
          description: "External dependencies are failing. Circuit is OPEN."
