site_name: API Reliability Suite
site_url: https://daretechie.github.io/api-reliability-suite/
site_description: Backend, DevOps, and AI reliability template for FastAPI services.
site_author: daretechie
repo_url: https://github.com/daretechie/api-reliability-suite
repo_name: daretechie/api-reliability-suite

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/thumbnail.png
  favicon: assets/thumbnail.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html

nav:
  - Introduction: index.md
  - Quick Start: setup.md
  - Development Guide: development.md
  - Configuration: configuration.md
  - Security: security.md
  - Deployment: deployment.md
  - Performance: performance.md
  - Reliability Features: reliability.md
  - Monitoring & Metrics: observability.md
  - Technical Architecture: architecture.md
  - Design Notes: strategic_architecture.md
  - API Reference: api-reference.md
  - Troubleshooting: troubleshooting.md
  - Decision Log (ADRs):
      - Hexagonal Arch: adr/0001-hexagonal-architecture.md
      - Logging: adr/0002-structured-logging.md
      - AI & LLM: adr/0003-ai-error-analysis.md
  - Developer Wiki: wiki.md
