name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  sbom-and-container-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build hardened runtime image
        run: docker build -t localbuild/api-reliability-suite:${{ github.sha }} .

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: localbuild/api-reliability-suite:${{ github.sha }}
          format: spdx-json
          artifact-name: api-reliability-suite-sbom.spdx.json
          output-file: api-reliability-suite-sbom.spdx.json

      - name: Scan image for vulnerabilities
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: localbuild/api-reliability-suite:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          cache-db: true
          config: .grype.yaml
          output-format: sarif

      - name: Upload vulnerability report
        if: always()
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
